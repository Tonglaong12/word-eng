<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 สมุดคำศัพท์</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F5EFE6;
    --surface:   #FDF8F2;
    --card:      #FFFCF7;
    --border:    #DDD0BB;
    --primary:   #8B6340;
    --accent:    #C1783C;
    --accent2:   #6B8E6B;
    --text:      #3D2B1F;
    --muted:     #7A6555;
    --tag:       #E8D5BC;
    --shadow:    rgba(61,43,31,.10);
    --danger:    #B85C38;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* ─── HEADER ─── */
  header{
    background:linear-gradient(135deg,#7B4F2E 0%,#A0673A 50%,#C1913A 100%);
    padding:28px 32px 24px;
    color:#FDF8F2;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
    box-shadow:0 4px 20px rgba(61,43,31,.25);
  }
  .logo{display:flex;align-items:center;gap:12px}
  .logo h1{font-family:'Playfair Display',serif;font-size:1.8rem;letter-spacing:.5px}
  .logo span{font-size:2rem}
  .header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .search-wrap{position:relative}
  .search-wrap input{
    padding:10px 16px 10px 40px;border:none;border-radius:24px;
    background:rgba(255,255,255,.20);color:#fff;font-size:.9rem;font-family:'Nunito',sans-serif;
    width:220px;outline:none;transition:.2s;
    backdrop-filter:blur(4px);
  }
  .search-wrap input::placeholder{color:rgba(255,255,255,.7)}
  .search-wrap input:focus{background:rgba(255,255,255,.30);width:260px}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.8;font-size:.95rem}
  .btn-add{
    background:#FDF8F2;color:#7B4F2E;border:none;padding:10px 20px;
    border-radius:24px;font-size:.9rem;font-weight:700;font-family:'Nunito',sans-serif;
    cursor:pointer;display:flex;align-items:center;gap:6px;
    transition:.2s;white-space:nowrap;
  }
  .btn-add:hover{background:#FFF;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}

  /* ─── STATS BAR ─── */
  .stats-bar{
    display:flex;gap:20px;padding:16px 32px;
    background:var(--surface);border-bottom:1px solid var(--border);
    align-items:center;flex-wrap:wrap;
  }
  .stat{font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:6px}
  .stat strong{color:var(--primary);font-weight:700}
  .filter-wrap{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .btn-io{
    padding:5px 13px;border-radius:16px;border:1.5px solid var(--border);
    background:transparent;font-family:'Nunito',sans-serif;font-size:.8rem;
    color:var(--muted);cursor:pointer;transition:.2s;
  }
  .btn-io:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn-sync{
    padding:6px 16px;border-radius:20px;border:none;
    background:linear-gradient(135deg,#4CAF50,#388E3C);
    font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;
    color:#fff;cursor:pointer;transition:.2s;white-space:nowrap;
    box-shadow:0 2px 8px rgba(76,175,80,.3);
  }
  .btn-sync:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(76,175,80,.4)}
  .btn-sync:disabled{opacity:.6;cursor:default;transform:none}
  .filter-btn{
    padding:5px 14px;border-radius:16px;border:1.5px solid var(--border);
    background:transparent;font-family:'Nunito',sans-serif;font-size:.8rem;
    color:var(--muted);cursor:pointer;transition:.2s;
  }
  .filter-btn.active,.filter-btn:hover{
    background:var(--primary);color:#fff;border-color:var(--primary);
  }

  /* ─── GRID ─── */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;padding:28px 32px;
  }

  /* ─── CARD ─── */
  .card{
    background:var(--card);border-radius:16px;border:1px solid var(--border);
    overflow:hidden;transition:.25s;
    box-shadow:0 2px 12px var(--shadow);
    display:flex;flex-direction:column;
  }
  .card{cursor:pointer}
  .card:hover{transform:translateY(-4px);box-shadow:0 8px 28px var(--shadow)}

  .card-img{
    width:100%;height:180px;object-fit:cover;display:block;
    background:linear-gradient(135deg,#E8D5BC,#C8B89A);
  }
  .card-img-placeholder{
    width:100%;height:180px;display:flex;align-items:center;justify-content:center;
    font-size:3.5rem;background:linear-gradient(135deg,#F0E6D6,#DDD0BB);
  }

  .card-compact{padding:14px 18px 8px;display:flex;flex-direction:column;gap:5px}
  .card-expand-hint{
    font-size:.68rem;color:var(--muted);text-align:center;padding:4px 0 8px;
    opacity:.55;transition:.2s;letter-spacing:.3px;
  }
  .card:hover .card-expand-hint{opacity:1;color:var(--accent)}
  .card.expanded .card-expand-hint{display:none}

  .card-details{
    max-height:0;overflow:hidden;
    transition:max-height .35s ease;
    border-top:1px solid transparent;
  }
  .card.expanded .card-details{
    max-height:3000px;
    border-top-color:var(--border);
  }
  .card-details-inner{padding:12px 18px 6px;display:flex;flex-direction:column;gap:8px}

  .card-body{padding:18px 20px;flex:1;display:flex;flex-direction:column;gap:8px}
  .card-word{
    font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;
    color:var(--text);line-height:1.2;display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;
  }
  .card-pos{
    font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:600;
    color:var(--muted);font-style:italic;white-space:nowrap;
  }
  .card-pron{
    font-size:.82rem;color:var(--accent);font-style:italic;
    background:var(--tag);display:inline-block;padding:2px 10px;border-radius:12px;
  }
  .card-trans{
    font-size:1rem;font-weight:600;color:var(--primary);margin-top:4px;
  }
  .card-ex{
    font-size:.83rem;color:var(--muted);line-height:1.55;
    padding:10px 12px 6px;background:var(--bg);border-radius:10px 10px 0 0;
    border-left:3px solid var(--accent);margin-top:4px;font-style:italic;
  }
  .card-ex-thai{
    font-size:.78rem;color:var(--primary);
    padding:4px 12px 10px;background:var(--bg);
    border-left:3px solid var(--accent);
    border-radius:0 0 10px 10px;
    line-height:1.5;margin-top:0;
  }
  .card-grammar{
    font-size:.8rem;background:linear-gradient(135deg,#EDE8DC,#E5DDD0);
    border-radius:10px;padding:10px 14px;margin-top:4px;
    color:var(--text);line-height:1.75;
    border:1px solid var(--border);white-space:pre-line;
  }
  .card-grammar-title{
    font-weight:700;color:var(--primary);margin-bottom:4px;
    font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;
    display:flex;align-items:center;gap:5px;
  }
  .card-sentence-analysis{
    margin-top:6px;border:1px solid var(--border);
    border-radius:10px;overflow:hidden;
  }
  .structure-formula{
    font-size:.78rem;font-weight:700;color:var(--accent);
    padding:5px 12px;background:var(--tag);letter-spacing:.3px;
  }
  .structure-table{width:100%;border-collapse:collapse;font-size:.76rem}
  .structure-table th{
    background:linear-gradient(135deg,#EDE8DC,#E5DDD0);
    padding:5px 10px;text-align:left;color:var(--primary);
    font-size:.7rem;text-transform:uppercase;letter-spacing:.4px;
  }
  .structure-table td{
    padding:5px 10px;border-top:1px solid var(--border);
    color:var(--text);vertical-align:top;
  }
  .structure-table td:first-child{
    font-weight:700;color:var(--accent);white-space:nowrap;width:44px;
  }
  .structure-table td:last-child{color:var(--primary);font-weight:600}
  .btn-analyze{
    margin-top:8px;padding:7px 14px;
    background:var(--tag);border:1.5px solid var(--primary);
    border-radius:8px;font-family:'Nunito',sans-serif;
    font-size:.82rem;color:var(--primary);cursor:pointer;
    font-weight:600;transition:.2s;
  }
  .btn-analyze:hover{background:#E8D0B0}
  .btn-analyze:disabled{opacity:.55;cursor:not-allowed}
  #analysisPreview{margin-top:8px}

  .card-footer{
    display:flex;justify-content:flex-end;gap:8px;
    padding:10px 16px 14px;
  }
  .btn-icon{
    border:none;background:transparent;cursor:pointer;
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:1rem;transition:.2s;
  }
  .btn-edit{color:var(--primary)}
  .btn-edit:hover{background:#EDE0CC}
  .btn-del{color:var(--danger)}
  .btn-del:hover{background:#FDECEA}

  /* ─── EMPTY STATE ─── */
  .empty{
    grid-column:1/-1;text-align:center;padding:64px 32px;
    color:var(--muted);
  }
  .empty .em-icon{font-size:4rem;margin-bottom:16px;display:block}
  .empty p{font-size:1rem;line-height:1.7}

  /* ─── MODAL OVERLAY ─── */
  .overlay{
    display:none;position:fixed;inset:0;
    background:rgba(61,43,31,.45);backdrop-filter:blur(3px);
    z-index:999;align-items:center;justify-content:center;padding:20px;
  }
  .overlay.open{display:flex}
  .modal{
    background:var(--card);border-radius:20px;width:100%;max-width:520px;
    max-height:90vh;overflow-y:auto;
    box-shadow:0 20px 60px rgba(61,43,31,.30);
    animation:slideUp .25s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-header{
    background:linear-gradient(135deg,#7B4F2E,#A0673A);
    padding:22px 28px;color:#FDF8F2;
    display:flex;align-items:center;justify-content:space-between;
    border-radius:20px 20px 0 0;
  }
  .modal-header h2{font-family:'Playfair Display',serif;font-size:1.3rem}
  .btn-close{
    background:rgba(255,255,255,.2);border:none;color:#fff;
    width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.2s;
  }
  .btn-close:hover{background:rgba(255,255,255,.35)}

  .modal-body{padding:28px}
  .form-group{margin-bottom:20px}
  label{display:block;font-size:.82rem;font-weight:700;color:var(--primary);margin-bottom:6px;letter-spacing:.3px}
  input[type=text],textarea{
    width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
    font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--text);
    background:var(--surface);outline:none;transition:.2s;
    resize:vertical;
  }
  input[type=text]:focus,textarea:focus{border-color:var(--accent);background:#fff}
  textarea{min-height:80px}

  /* image preview */
  .img-preview-wrap{
    display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start;margin-top:10px;
  }
  #imgPreview{
    width:90px;height:80px;object-fit:cover;border-radius:10px;
    border:2px solid var(--border);display:none;
  }
  .img-actions{display:flex;flex-direction:column;gap:8px;flex:1}
  .btn-upload{
    padding:8px 14px;background:var(--tag);border:1.5px dashed var(--primary);
    border-radius:10px;font-family:'Nunito',sans-serif;font-size:.82rem;
    color:var(--primary);cursor:pointer;font-weight:600;text-align:center;
    transition:.2s;
  }
  .btn-upload:hover{background:#E8D0B0}
  #fileInput{display:none}

  /* emoji picker */
  .emoji-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .emoji-btn{
    font-size:1.4rem;border:none;background:var(--tag);border-radius:8px;
    padding:4px 8px;cursor:pointer;transition:.15s;
  }
  .emoji-btn:hover{background:#E8D0B0;transform:scale(1.1)}
  .emoji-btn.selected{outline:2px solid var(--accent)}

  /* modal footer */
  .modal-footer{
    display:flex;justify-content:flex-end;gap:12px;
    padding:0 28px 28px;
  }
  .btn-cancel{
    padding:10px 22px;background:transparent;border:1.5px solid var(--border);
    border-radius:10px;font-family:'Nunito',sans-serif;font-size:.9rem;
    color:var(--muted);cursor:pointer;transition:.2s;
  }
  .btn-cancel:hover{border-color:var(--primary);color:var(--primary)}
  .btn-save{
    padding:10px 28px;background:linear-gradient(135deg,#7B4F2E,#A0673A);
    border:none;border-radius:10px;font-family:'Nunito',sans-serif;
    font-size:.9rem;font-weight:700;color:#fff;cursor:pointer;transition:.2s;
  }
  .btn-save:hover{background:linear-gradient(135deg,#6A422A,#8B5830);transform:translateY(-1px)}

  /* ─── TOAST ─── */
  .toast{
    position:fixed;bottom:28px;right:28px;
    background:#3D2B1F;color:#FDF8F2;padding:12px 20px;
    border-radius:12px;font-size:.88rem;font-weight:600;
    box-shadow:0 6px 24px rgba(0,0,0,.25);
    transform:translateY(80px);opacity:0;
    transition:.35s cubic-bezier(.34,1.56,.64,1);
    z-index:9999;pointer-events:none;
  }
  .toast.show{transform:translateY(0);opacity:1}

  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  /* ─── RESPONSIVE ─── */
  @media(max-width:600px){
    header{padding:20px 16px}
    .grid{padding:16px;gap:14px}
    .stats-bar{padding:12px 16px}
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <span>📖</span>
    <h1>สมุดคำศัพท์</h1>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="ค้นหาคำศัพท์...">
    </div>
    <button class="btn-add" onclick="openModal()">＋ เพิ่มคำศัพท์</button>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat">📚 คำศัพท์ทั้งหมด <strong id="totalCount">0</strong> คำ</div>
  <div class="stat">✨ เพิ่มล่าสุด <strong id="latestWord">—</strong></div>
  <div class="filter-wrap" id="filterWrap">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">ทั้งหมด</button>
  </div>
  <button class="btn-io" onclick="exportCards()" title="Export คำศัพท์ทั้งหมดเป็น JSON">⬇️ Export</button>
  <label class="btn-io" title="Import คำศัพท์จากไฟล์ JSON">
    ⬆️ Import
    <input type="file" id="importFile" accept=".json" onchange="importCards(event)" style="display:none">
  </label>
  <button id="btnSync" class="btn-sync" onclick="syncCloud()">☁️ Sync ขึ้น Cloud</button>
  <span id="userInfo" style="display:none;font-size:.78rem;color:var(--accent2);font-weight:600"></span>
</div>

<!-- CARD GRID -->
<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOnBackdrop(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">✏️ เพิ่มคำศัพท์ใหม่</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">

      <div class="form-group">
        <label>🔤 คำศัพท์ (Word)</label>
        <div style="position:relative">
          <input type="text" id="fWord" placeholder="เช่น Serendipity" oninput="scheduleAutoFill()" autocomplete="off">
          <div id="lookupStatus" style="
            position:absolute;right:12px;top:50%;transform:translateY(-50%);
            font-size:.78rem;color:var(--accent);font-weight:600;display:none;
          "></div>
        </div>
        <div id="autoTag" style="display:none;margin-top:6px;font-size:.76rem;color:var(--accent2);
          background:#EDF3ED;border-radius:8px;padding:4px 10px;display:inline-flex;align-items:center;gap:6px">
          ✨ เติมให้อัตโนมัติแล้ว — แก้ไขได้เลยถ้าต้องการ
        </div>
      </div>
      <div class="form-group">
        <label>🔊 คำอ่าน (Pronunciation)</label>
        <input type="text" id="fPron" placeholder="เช่น /ˌser.ənˈdɪp.ɪ.ti/">
      </div>
      <div class="form-group">
        <label>📖 ประเภทคำ (Parts of Speech)</label>
        <input type="text" id="fPos" placeholder="เช่น verb, noun, adjective (เติมอัตโนมัติ)">
      </div>
      <div class="form-group">
        <label>🌏 คำแปล (Translation)</label>
        <input type="text" id="fTrans" placeholder="เช่น โชคที่เกิดจากความบังเอิญอันยินดี">
      </div>
      <div class="form-group">
        <label>📝 ตัวอย่างประโยค (Example)</label>
        <textarea id="fEx" placeholder="เช่น Finding that old photo was pure serendipity."></textarea>
      </div>
      <div class="form-group">
        <button type="button" class="btn-analyze" id="btnAnalyze" onclick="triggerAnalyze()">🔍 วิเคราะห์โครงสร้างประโยค</button>
        <div id="analysisPreview"></div>
      </div>
      <div class="form-group">
        <label>🇹🇭 คำแปลประโยคตัวอย่าง</label>
        <textarea id="fExThai" placeholder="คำแปลภาษาไทยของประโยคตัวอย่าง (เติมอัตโนมัติ)" style="min-height:60px"></textarea>
      </div>
      <div class="form-group">
        <label>📚 Grammar ไวยากรณ์</label>
        <button type="button" class="btn-analyze" id="btnGrammar" onclick="triggerGrammar()" style="margin-bottom:8px">📚 สร้าง Grammar</button>
        <textarea id="fGrammar" placeholder="AI จะอธิบายจุดไวยากรณ์น่าสนใจในประโยคตัวอย่างเป็นภาษาไทย (กด สร้าง Grammar หรือรอ auto-fill)" style="min-height:130px"></textarea>
      </div>
      <div class="form-group">
        <label>🖼️ รูปภาพ</label>
        <input type="text" id="fImg" placeholder="วาง URL รูปภาพ (ต้องเป็น .jpg/.png/.webp ตรงๆ) หรือเลือกไฟล์ด้านล่าง" oninput="previewURL()">
        <div class="img-preview-wrap">
          <img id="imgPreview" src="" alt="preview" onerror="imgError()" onload="imgLoaded()">
          <div class="img-actions">
            <div class="btn-upload" onclick="document.getElementById('fileInput').click()">📁 เลือกจากเครื่อง</div>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
            <div style="font-size:.75rem;color:var(--muted)">หรือเลือก Emoji แทนรูปได้:</div>
            <div class="emoji-row" id="emojiRow"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-save" onclick="saveCard()">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ─── DATA ─── */
const STORE_KEY = 'vocab_cards_v2';
let cards = [];
let editingId = null;
let selectedEmoji = '';
let currentFilter = 'all';
let currentSentenceAnalysis = null;

const EMOJIS = ['🌸','🌿','🍃','🦋','🌊','🌙','⭐','🦁','🌺','🍀',
                 '🌻','🦚','🌈','🎯','💎','🔥','🌸','🍁','🦜','🏔️'];

/* ─── SAMPLE DATA ─── */
const SAMPLES = [
  {
    id:'s1', word:'Serendipity', pron:'/ˌser.ənˈdɪp.ɪ.ti/', trans:'โชคดีที่เกิดจากความบังเอิญอันน่ายินดี',
    ex:'Finding that old letter in the attic was pure serendipity.',
    img:'https://images.unsplash.com/photo-1504208434309-cb69f4fe52b0?w=400&q=80',
    tag:'', created: Date.now()-5000
  },
  {
    id:'s2', word:'Resilience', pron:'/rɪˈzɪl.i.əns/', trans:'ความสามารถในการฟื้นคืนสภาพ, ความยืดหยุ่น',
    ex:'Her resilience in the face of adversity inspired everyone around her.',
    img:'https://images.unsplash.com/photo-1502082553048-f009c37129b9?w=400&q=80',
    tag:'', created: Date.now()-4000

/* ─── INIT ─── */
function init(){
  const saved = localStorage.getItem(STORE_KEY);
  cards = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(SAMPLES));
  renderEmojis();
  render();
  migrateMissingPos();
}

async function migrateMissingPos(){
  const missing = cards.filter(c => !c.pos && c.word);
  if(!missing.length) return;
  for(const card of missing){
    try{
      const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(card.word.toLowerCase())}`);
      if(!r.ok) continue;
      const data = await r.json();
      const pos = data[0]?.meanings?.[0]?.partOfSpeech;
      if(pos){
        const idx = cards.findIndex(c=>c.id===card.id);
        if(idx>-1) cards[idx].pos = pos;
      }
    }catch(e){}
  }
  save();
  render();
}

function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(cards));
}

/* ─── RENDER ─── */
function render(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = cards;
  if(q) list = list.filter(c=>
    c.word.toLowerCase().includes(q)||
    c.trans.includes(q)||
    c.ex.toLowerCase().includes(q)
  );
  if(currentFilter!=='all') list = list.filter(c=>(c.tag||'all')===currentFilter);

  document.getElementById('totalCount').textContent = cards.length;
  const latest = cards.slice().sort((a,b)=>b.created-a.created)[0];
  document.getElementById('latestWord').textContent = latest ? latest.word : '—';

  const grid = document.getElementById('grid');
  if(!list.length){
    grid.innerHTML=`<div class="empty"><span class="em-icon">📭</span><p>${q?'ไม่พบคำศัพท์ที่ค้นหา':'ยังไม่มีคำศัพท์ กด <strong>เพิ่มคำศัพท์</strong> เพื่อเริ่มต้น!'}</p></div>`;
    return;
  }
  grid.innerHTML = list.map(c=>cardHTML(c)).join('');
}

function cardHTML(c){
  const imgPart = c.img
    ? c.img.startsWith('data:') || c.img.startsWith('http') || c.img.startsWith('/')
      ? `<img class="card-img" src="${c.img}" alt="${c.word}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`+
        `<div class="card-img-placeholder" style="display:none">${c.emoji||'📖'}</div>`
      : `<div class="card-img-placeholder">${c.img}</div>`
    : `<div class="card-img-placeholder">${c.emoji||'📖'}</div>`;

  const safeGrammar = c.grammar
    ? c.grammar.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')
    : '';

  return `<div class="card" id="card-${c.id}" onclick="toggleCard(this)">
    ${imgPart}
    <div class="card-compact">
      <div class="card-word">
        ${c.word}
        ${c.pos?`<span class="card-pos">(${c.pos})</span>`:''}
      </div>
      ${c.pron?`<span class="card-pron">${c.pron}</span>`:''}
    </div>
    <div class="card-expand-hint">▾ กดดูรายละเอียด</div>
    <div class="card-details">
      <div class="card-details-inner">
        <div class="card-trans">${c.trans}</div>
        ${c.ex?`
          <div class="card-ex">"${c.ex}"</div>
          ${c.exThai?`<div class="card-ex-thai">🇹🇭 ${c.exThai}</div>`:''}
        `:''}
        ${safeGrammar?`
          <div class="card-grammar">
            <div class="card-grammar-title">📚 Grammar</div>
            ${safeGrammar}
          </div>
        `:''}
        ${c.sentenceAnalysis?.parts?.length?`
          <div class="card-sentence-analysis">
            <div class="structure-formula">🔍 ${c.sentenceAnalysis.structure||'โครงสร้างประโยค'}</div>
            <table class="structure-table">
              <thead><tr><th>ส่วน</th><th>คำในประโยค</th><th>หน้าที่</th></tr></thead>
              <tbody>${c.sentenceAnalysis.parts.map(p=>`<tr><td>${p.part}</td><td>${p.words}</td><td>${p.role}</td></tr>`).join('')}</tbody>
            </table>
          </div>
        `:''}
      </div>
    </div>
    <div class="card-footer">
      <button class="btn-icon btn-edit" title="แก้ไข" onclick="event.stopPropagation();editCard('${c.id}')">✏️</button>
      <button class="btn-icon btn-del" title="ลบ" onclick="event.stopPropagation();deleteCard('${c.id}')">🗑️</button>
    </div>
  </div>`;
}

function saveCard(){
  const word = document.getElementById('fWord').value.trim();
  if(!word){ showToast('⚠️ กรุณากรอกคำศัพท์'); return; }
  const trans = document.getElementById('fTrans').value.trim();
  if(!trans){ showToast('⚠️ กรุณากรอกคำแปล'); return; }

  const imgVal = document.getElementById('fImg').value.trim();
  const id = editingId || ('c'+Date.now());

  if(editingId){
    const idx = cards.findIndex(x=>x.id===editingId);
    if(idx>-1){
      cards[idx] = {
        ...cards[idx],
        word, trans,
        pron:document.getElementById('fPron').value.trim(),
        pos:document.getElementById('fPos').value.trim(),
        ex:document.getElementById('fEx').value.trim(),
        exThai:document.getElementById('fExThai').value.trim(),
        grammar:document.getElementById('fGrammar').value.trim(),
        sentenceAnalysis:currentSentenceAnalysis,
        img: selectedEmoji ? '' : imgVal,
        emoji: selectedEmoji || '',
      };
    }
    showToast('✅ บันทึกเรียบร้อยแล้ว');
  } else {
    cards.unshift({
      id, word, trans,
      pron:document.getElementById('fPron').value.trim(),
      pos:document.getElementById('fPos').value.trim(),
      ex:document.getElementById('fEx').value.trim(),
      exThai:document.getElementById('fExThai').value.trim(),
      grammar:document.getElementById('fGrammar').value.trim(),
      sentenceAnalysis:currentSentenceAnalysis,
      img: selectedEmoji ? '' : imgVal,

      tag:'', created:Date.now()
    });
    showToast('✅ เพิ่มคำศัพท์ใหม่แล้ว');
  }

  save();
  closeModal();
  render();
}

/* ─── IPA → Thai Phonetic Converter ─── */
function ipaToThai(rawIpa) {
  if (!rawIpa) return '';
  let ipa = rawIpa.replace(/[\/\[\]]/g, '').trim();
  const syllables = ipa.split(/[.ˈˌ]/).map(s => s.trim()).filter(Boolean);
  if (!syllables.length) return '';

  // [ipa_pattern, thai_prefix (goes before consonant), thai_suffix (goes after consonant)]
  const VOWELS = [
    ['iː','','ี'], ['uː','','ู'], ['ɑː','','า'], ['ɔː','','อ'], ['ɜː','เ','อ'],
    ['eɪ','เ',''], ['aɪ','','าย'], ['ɔɪ','','อย'], ['aʊ','','าว'],
    ['əʊ','โ',''], ['oʊ','โ',''],
    ['ɪə','เ','ีย'], ['eə','แ',''], ['ʊə','','ัว'],
    ['ɪ','','ิ'], ['ʊ','','ุ'],
    ['ɛ','เ','อ'], ['æ','แ',''],
    ['ɒ','','อ'], ['ɔ','','อ'], ['ʌ','','ะ'],
    ['ə','เ','อ'], ['ɑ','','า'], ['ɜ','เ','อ'],
    ['e','เ','อ'], ['a','','า'], ['o','โ',''],
    ['i','','ี'], ['u','','ู'],
  ];
  const CONS = [
    ['tʃ','ช'], ['dʒ','จ'],
    ['θ','ธ'], ['ð','ด'], ['ʃ','ช'], ['ʒ','จ'], ['ŋ','ง'],
    ['p','พ'], ['b','บ'], ['t','ท'], ['d','ด'],
    ['k','ค'], ['g','ก'], ['f','ฟ'], ['v','ว'],
    ['s','ส'], ['z','ซ'], ['h','ฮ'],
    ['m','ม'], ['n','น'], ['l','ล'], ['r','ร'],
    ['j','ย'], ['w','ว'],
  ];

  function parseTokens(syl) {
    let tokens = [], i = 0;
    while (i < syl.length) {
      let found = false;
      for (const [pat, pre, post] of VOWELS) {
        if (syl.startsWith(pat, i)) {
          tokens.push({type:'V', pre, post});
          i += pat.length; found = true; break;
        }
      }
      if (!found) {
        for (const [pat, thai] of CONS) {
          if (syl.startsWith(pat, i)) {
            tokens.push({type:'C', thai});
            i += pat.length; found = true; break;
          }
        }
      }
      if (!found) i++;
    }
    return tokens;
  }

  function buildThai(tokens) {
    let result = '';
    let preConsBuf = [];
    let postVowel = false;
    for (const t of tokens) {
      if (t.type === 'C') {
        if (!postVowel) preConsBuf.push(t.thai);
        else result += t.thai;
      } else {
        postVowel = true;
        const base = preConsBuf.length ? preConsBuf.join('') : 'อ';
        preConsBuf = [];
        result += (t.pre || '') + base + (t.post || '');
      }
    }
    result += preConsBuf.join('');
    return result;
  }

  return syllables.map(s => buildThai(parseTokens(s))).filter(Boolean).join('-');
}

/* ─── SENTENCE ANALYSIS ─── */
const ROLE_TH = {
  'Subject':'ประธาน','Verb':'กริยา','Predicate':'กริยา',
  'Object':'กรรม','Direct Object':'กรรมตรง','Indirect Object':'กรรมรอง',
  'Adverb':'กริยาวิเศษณ์','Adverbial':'กริยาวิเศษณ์',
  'Adjective':'คำคุณศัพท์','Article':'คำนำหน้านาม',
  'Conjunction':'คำเชื่อม','Connector':'คำเชื่อม','Transition':'คำเชื่อม',
  'Prepositional Phrase':'วลีบุพบท','Preposition':'คำบุพบท',
  'Complement':'ส่วนเติมเต็ม','Subject Complement':'ส่วนขยายประธาน',
  'Modifier':'คำขยาย','Clause':'อนุประโยค',
};

async function analyzeSentenceGrammar(sentence) {
  if(!sentence) return null;
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), 25000);
  try {
    const sent = sentence.slice(0, 150).replace(/"/g,"'");
    const prompt = `Analyze the grammar parts of this English sentence: "${sent}". Output ONLY a JSON object (no markdown, no text before or after): {"structure":"S + V + O","parts":[{"part":"S","words":"Every person","role":"Subject"},{"part":"V","words":"has","role":"Verb"},{"part":"O","words":"a unique life","role":"Object"}]}. Role options: Subject, Verb, Object, Adverb, Conjunction, Prepositional Phrase, Complement, Modifier, Transition. JSON only.`;
    const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai`, {
      signal: ctrl.signal
    });
    clearTimeout(tid);
    if(!res.ok) return null;
    const raw = await res.text();
    const cleaned = raw.replace(/```(?:json)?/gi,'').replace(/```/g,'').trim();
    const match = cleaned.match(/\{[\s\S]*\}/);
    if(!match) return null;
    const data = JSON.parse(match[0]);
    if(!data?.parts?.length) return null;
    data.parts = data.parts.map(p=>({...p, role: ROLE_TH[p.role?.trim()] || p.role}));
    return data;
  } catch(e){ clearTimeout(tid); return null; }
}

    }
  } finally {
    btn.textContent = '🔍 วิเคราะห์โครงสร้างประโยค';
    btn.disabled = false;
  }
}

        <th style="padding:4px 8px;text-align:left;font-size:.7rem;color:var(--primary)">ส่วน</th>
        <th style="padding:4px 8px;text-align:left;font-size:.7rem;color:var(--primary)">คำในประโยค</th>
        <th style="padding:4px 8px;text-align:left;font-size:.7rem;color:var(--primary)">หน้าที่</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

/* ─── GRAMMAR EXPLANATION (AI) ─── */
async function generateGrammarExplanation(word, ex) {
  if(!word) return '';
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), 30000);
  try {
    const safeSent = (ex || '').slice(0, 180).replace(/"/g,"'");
    const prompt = ex
      ? `The word "${word}" appears in this sentence: "${safeSent}". Please explain 2-3 interesting grammar points about this sentence. Write the full response in Thai language. Format:\n1. [Question in Thai, e.g. why is this verb form used?]\n[Explanation in Thai, 2-4 lines]\n\n2. [Question in Thai]\n[Explanation in Thai]\n\nRespond entirely in Thai.`
      : `Explain 2 grammar points about the English word "${word}". Write in Thai language. Format:\n1. [Thai question]\n[Thai explanation]\n2. [Thai question]\n[Thai explanation]`;
    const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai`, {
      signal: ctrl.signal
    });
    clearTimeout(tid);
    if(!res.ok) return '';
    return (await res.text()).trim();
  } catch(e){ clearTimeout(tid); return ''; }
}

async function triggerGrammar(){
  const word = document.getElementById('fWord').value.trim();
  const ex   = document.getElementById('fEx').value.trim();
  if(!word){ showToast('⚠️ กรอกคำศัพท์ก่อน'); return; }
  const btn = document.getElementById('btnGrammar');
  btn.textContent = '⏳ กำลังสร้าง...';
  btn.disabled = true;
  try {
    const result = await generateGrammarExplanation(word, ex);
    if(result){
      document.getElementById('fGrammar').value = result;
      showToast('✅ สร้าง Grammar แล้ว');
    } else {
      showToast('⚠️ ไม่สำเร็จ ลองอีกครั้ง');
    }
  } finally {
    btn.textContent = '📚 สร้าง Grammar';
    btn.disabled = false;
  }
}

/* ─── AUTO-FILL ─── */
let autoFillTimer = null;

function scheduleAutoFill(){
  clearTimeout(autoFillTimer);
  const word = document.getElementById('fWord').value.trim();
  if(!word){ setStatus(''); return; }
  setStatus('⏳');
  autoFillTimer = setTimeout(()=>autoFill(word), 600);
}

async function autoFill(word){
  if(!word) return;
  setStatus('🔍 กำลังค้นหา...');
  document.getElementById('autoTag').style.display = 'none';

  let pron = '', pos = '', trans = '', ex = '', exThai = '', grammar = '', imgUrl = '';

  // Run all sources in parallel
  const [dictResult, transResult, wikiResult] = await Promise.allSettled([
    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.toLowerCase())}`)
      .then(r => r.ok ? r.json() : null),
    fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word.toLowerCase())}&langpair=en|th`)
      .then(r => r.ok ? r.json() : null),
    fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(word.toLowerCase())}&prop=pageimages&format=json&pithumbsize=600&origin=*`)
      .then(r => r.ok ? r.json() : null),
  ]);

  let def1 = '';
  if(dictResult.status==='fulfilled' && dictResult.value){
    const entry = dictResult.value[0];
    if(entry){
      const ipaRaw = entry.phonetics?.find(p=>p.text)?.text || entry.phonetic || '';
      if(ipaRaw) pron = ipaToThai(ipaRaw);
      if(entry.meanings?.[0]?.partOfSpeech) pos = entry.meanings[0].partOfSpeech;
      for(const meaning of (entry.meanings||[])){
        for(const def of (meaning.definitions||[])){
          if(!def1 && def.definition) def1 = def.definition;
          if(def.example && !ex) ex = def.example;
        }
      }
    }
  }

  if(transResult.status==='fulfilled' && transResult.value){
    const t = transResult.value?.responseData?.translatedText;
    if(t && t.toLowerCase()!==word.toLowerCase()) trans = t;
  }

  if(wikiResult.status==='fulfilled' && wikiResult.value){
    const pages = wikiResult.value?.query?.pages;
    if(pages){ const page = Object.values(pages)[0]; if(page.thumbnail?.source) imgUrl = page.thumbnail.source; }
  }

  // Phase 2: translate ex + analyze structure + generate grammar (all parallel)
  const [transExResult, analysisResult, grammarResult] = await Promise.allSettled([
    ex
      ? fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(ex.slice(0,200))}&langpair=en|th`).then(r=>r.ok?r.json():null)
      : Promise.resolve(null),
    ex ? analyzeSentenceGrammar(ex) : Promise.resolve(null),
    generateGrammarExplanation(word, ex)
  ]);
  if(transExResult.status==='fulfilled' && transExResult.value){
    const t2 = transExResult.value?.responseData?.translatedText;
    if(t2 && t2.trim()) exThai = t2;
  }
  if(analysisResult.status==='fulfilled' && analysisResult.value){
    currentSentenceAnalysis = analysisResult.value;
  }
  if(grammarResult.status==='fulfilled' && grammarResult.value){
    grammar = grammarResult.value;
  }

  // Image: AI generation via Pollinations with context-aware prompt
  if(!imgUrl){
    let scene = '';
    const w = word.toLowerCase();
    if(pos === 'verb'){
      scene = ex
        ? `a person or scene illustrating "${ex.slice(0,80)}", showing the action of ${w}`
        : (def1 ? `scene of someone ${w}ing — ${def1.slice(0,80)}` : `action scene of ${w}ing`);
    } else if(pos === 'adjective'){
      scene = ex
        ? `visual example illustrating "${ex.slice(0,80)}", showing what ${w} means`
        : (def1 ? `visual example of something ${w}: ${def1.slice(0,80)}` : `something that is ${w}`);
    } else {
      // noun or other
      scene = ex
        ? `scene from "${ex.slice(0,80)}", illustrating the concept of ${w}`
        : (def1 ? `${w}: ${def1.slice(0,100)}` : w);
    }
    const imgPrompt = `${scene}. High quality educational photo or illustration. No text overlay. Realistic, directly relevant to the word "${w}".`;
    imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(imgPrompt)}?width=600&height=400&nologo=true`;
  }

  let filled = false;
  if(pron && !document.getElementById('fPron').value){
    document.getElementById('fPron').value = pron; filled = true;
  }
  if(pos && !document.getElementById('fPos').value){
    document.getElementById('fPos').value = pos; filled = true;
  }
  if(trans && !document.getElementById('fTrans').value){
    document.getElementById('fTrans').value = trans; filled = true;
  }
  if(ex && !document.getElementById('fEx').value){
    document.getElementById('fEx').value = ex; filled = true;
  }
  if(exThai && !document.getElementById('fExThai').value){
    document.getElementById('fExThai').value = exThai; filled = true;
  }
  if(grammar && !document.getElementById('fGrammar').value){
    document.getElementById('fGrammar').value = grammar; filled = true;
  }
  if(currentSentenceAnalysis){
    renderAnalysisPreview(currentSentenceAnalysis); filled = true;
  }
  if(imgUrl && !document.getElementById('fImg').value && !selectedEmoji){
    document.getElementById('fImg').value = imgUrl;
    previewURL();
    filled = true;
  }

  if(filled){
    setStatus('');
    document.getElementById('autoTag').style.display = 'inline-flex';
  } else if(!pron && !trans){
    setStatus('⚠️ ค้นหาไม่ได้ กรอกเองได้เลย');
    setTimeout(()=>setStatus(''),3000);
  } else {
    setStatus('');
  }
}

function setStatus(msg){
  const el = document.getElementById('lookupStatus');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

/* ─── EXPORT / IMPORT ─── */
function exportCards(){
  const data = JSON.stringify(cards, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `vocab-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('⬇️ Export สำเร็จ!');
}

function importCards(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const imported = JSON.parse(ev.target.result);
      if(!Array.isArray(imported)) throw new Error();
      // Merge: ถ้า ID ซ้ำให้ใช้ของที่ import มา (ใหม่กว่า)
      const existingIds = new Set(cards.map(c=>c.id));
      const newCards = imported.filter(c=>!existingIds.has(c.id));
      const merged = [...imported.filter(c=>existingIds.has(c.id)),
                      ...cards.filter(c=>!imported.find(i=>i.id===c.id)),
                      ...newCards];
      // Sort by created date
      cards = merged.sort((a,b)=>(b.created||0)-(a.created||0));
      save();
      render();
      showToast(`✅ Import สำเร็จ ${imported.length} คำ`);
    } catch(err){
      showToast('⚠️ ไฟล์ไม่ถูกต้อง');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

});

function updateSyncUI(){

async function syncCloud(){
  if(!currentUser){
    try{
      const provider = new firebase.auth.GoogleAuthProvider();
      await fbAuth.signInWithPopup(provider);
    } catch(e){
      showToast('⚠️ Login ไม่สำเร็จ');
      return;
    }
  }
  const btn = document.getElementById('btnSync');
  btn.disabled = true;
  btn.textContent = '⏳ กำลัง Sync...';
  try{
    const ref = fbDb.collection('users').doc(currentUser.uid).collection('data').doc('cards');
    const snap = await ref.get();
    if(snap.exists){
      const cloudCards = snap.data().cards || [];
      const localMap = new Map(cards.map(c=>[c.id,c]));
      const cloudMap = new Map(cloudCards.map(c=>[c.id,c]));
      const allIds = new Set([...localMap.keys(),...cloudMap.keys()]);
      const merged = [];
      allIds.forEach(id=>{
        const lo = localMap.get(id), cl = cloudMap.get(id);
        if(lo && cl) merged.push((lo.created||0)>=(cl.created||0)?lo:cl);
        else merged.push(lo||cl);
      });
      cards = merged.sort((a,b)=>(b.created||0)-(a.created||0));
      save(); render();
    }
    await ref.set({cards, updatedAt: Date.now()});
    showToast('☁️ Sync สำเร็จ!');
  } catch(e){
    showToast('⚠️ Sync ไม่สำเร็จ');
    console.error(e);
  }
  updateSyncUI();
}
